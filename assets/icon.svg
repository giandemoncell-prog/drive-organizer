<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#1e8e3e"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbc04"/>
      <stop offset="100%" style="stop-color:#f29900"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="256" height="256" rx="52" ry="52"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#4285f4" stroke-width="1">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Folder body -->
  <g filter="url(#shadow)">
    <!-- Folder tab -->
    <path d="M 56 96 L 56 88 Q 56 80 64 80 L 104 80 Q 112 80 116 88 L 120 96 Z" fill="url(#folder)" opacity="0.9"/>
    <!-- Folder main body -->
    <rect x="56" y="96" width="144" height="100" rx="8" ry="8" fill="url(#folder)" opacity="0.85"/>
  </g>

  <!-- File bars inside folder — representing organized files -->
  <!-- Bar 1 — blue (short) -->
  <rect x="76" y="116" width="44" height="12" rx="6" fill="url(#blue2)" opacity="0.95"/>
  <!-- Bar 2 — green (medium) -->
  <rect x="76" y="135" width="70" height="12" rx="6" fill="url(#green)" opacity="0.95"/>
  <!-- Bar 3 — yellow (long) -->
  <rect x="76" y="154" width="98" height="12" rx="6" fill="url(#yellow)" opacity="0.95"/>
  <!-- Bar 4 — blue (medium-short) -->
  <rect x="76" y="173" width="56" height="12" rx="6" fill="url(#blue2)" opacity="0.95"/>

  <!-- AI sparkle / organize indicator — top right of folder -->
  <g transform="translate(172, 80)" filter="url(#glow)">
    <!-- Circular arrow (reorganize symbol) -->
    <circle cx="20" cy="20" r="18" fill="#0d1b2a" stroke="#34a853" stroke-width="2.5"/>
    <!-- Arrow path — circular -->
    <path d="M 20 8 A 12 12 0 1 1 8.5 27" fill="none" stroke="#34a853" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="6,22 12,30 2,31" fill="#34a853"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="56" y="206" width="144" height="3" rx="1.5" fill="url(#blue2)" opacity="0.4"/>

  <!-- Corner glow effect -->
  <circle cx="228" cy="28" r="40" fill="#4285f4" opacity="0.06"/>
  <circle cx="28" cy="228" r="30" fill="#34a853" opacity="0.06"/>
</svg>
