# Ruff configuration for Drive Organizer.
# Operational one-off scripts under scripts/ and root-level _*.py files are excluded:
# they were written for single live Drive operations and kept for provenance only.
target-version = "py311"
line-length = 120
extend-exclude = ["scripts", "_*.py"]

[lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4", "RUF"]
ignore = [
    "E501",    # line length is enforced by the formatter, not the linter
    "SIM105", "SIM108", "B007",
    "RUF003",  # ambiguous unicode in Italian comments is intentional
    "UP017",   # datetime.UTC is py3.11-only; timezone.utc is more portable
    "B905",    # AI providers guarantee result/batch alignment by file_id (see cascade.py)
]

[lint.per-file-ignores]
"web_app/__init__.py" = ["E402"]      # blueprints imported after app creation by design
"drive_organizer/auth/google_auth.py" = ["E402"]
"tests/**" = ["B905", "B017"]
